<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES添削ツール｜就活の木</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== 就活の木 カラーパレット ===== */
  :root {
    --tree-green:      #2d6a4f;   /* 深い森の緑：メインカラー */
    --tree-mid:        #40916c;   /* 中間グリーン */
    --tree-light:      #74c69d;   /* 明るい若葉 */
    --tree-pale:       #d8f3dc;   /* 淡い若葉（背景アクセント） */
    --earth:           #8b5e3c;   /* 土色：アクセント */
    --earth-light:     #c49a6c;   /* 薄い土色 */
    --cream:           #faf8f4;   /* クリーム：ページ背景 */
    --cream-dark:      #f0ece3;   /* 少し濃いクリーム */
    --ink:             #2c2c2c;   /* 本文色 */
    --ink-mid:         #5a5a5a;   /* 中間グレー */
    --ink-light:       #9a9a9a;   /* 薄グレー */
    --border:          #d4e6da;   /* 緑がかったボーダー */
    --shadow-green:    rgba(45,106,79,0.12);
    --shadow-earth:    rgba(139,94,60,0.18);
    --gold:            #c8972b;   /* 警告・強調 */
    --red-soft:        #c0392b;   /* エラー・NG */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.75;
    min-height: 100vh;
  }

  /* 背景：葉脈テクスチャ風の淡いパターン */
  body {
    padding: 32px 16px 80px;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(116,198,157,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(45,106,79,0.06) 0%, transparent 50%);
  }

  /* ===== コンテナ ===== */
  .container {
    max-width: 980px;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    padding: 36px 40px;
    box-shadow:
      0 4px 6px var(--shadow-green),
      0 12px 40px rgba(45,106,79,0.08);
    border: 1px solid var(--border);
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--tree-pale);
    position: relative;
  }
  /* 木のアクセントライン */
  header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 80px;
    height: 2px;
    background: var(--tree-green);
    border-radius: 2px;
  }

  .brand-area { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--tree-green), var(--tree-mid));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 3px 10px var(--shadow-green);
    flex-shrink: 0;
  }
  h1 {
    font-family: "Noto Serif JP", serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--tree-green);
    letter-spacing: .02em;
  }
  .subtitle {
    font-size: 12px;
    color: var(--ink-mid);
    margin-top: 3px;
    letter-spacing: .01em;
  }
  .brand-tagline {
    font-size: 11px;
    color: var(--tree-mid);
    font-style: italic;
    margin-top: 2px;
  }

  /* ===== ボタン共通 ===== */
  .icon-btn {
    padding: 8px 16px;
    background: var(--cream-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: var(--tree-green);
    font-weight: 500;
    transition: background .15s, border-color .15s;
  }
  .icon-btn:hover {
    background: var(--tree-pale);
    border-color: var(--tree-light);
  }

  /* ===== 設定パネル ===== */
  .settings-panel {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .settings-panel.hidden { display: none; }

  /* ===== フォーム ===== */
  .form-row { margin-bottom: 18px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-row label {
    display: block;
    font-weight: 600;
    margin-bottom: 7px;
    color: var(--tree-green);
    font-size: 13px;
    letter-spacing: .03em;
  }

  input[type="text"], input[type="password"], select, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: var(--ink);
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--tree-mid);
    box-shadow: 0 0 0 3px rgba(64,145,108,0.15);
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.75; }
  textarea#esText { min-height: 220px; font-size: 15px; }
  select { cursor: pointer; }

  .row-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) {
    .row-2col { grid-template-columns: 1fr; }
    .container { padding: 20px 16px; }
  }

  .api-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
  }

  .help-text {
    font-size: 12px;
    color: #7f8c8d;
    margin-top: 4px;
  }

  .char-counter {
    text-align: right;
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 5px;
  }
  .char-counter.warn { color: var(--gold); font-weight: 500; }
  .char-counter.over { color: var(--red-soft); font-weight: 700; }

  /* ===== 送信ボタン ===== */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--tree-green) 0%, var(--tree-mid) 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    font-family: "Noto Sans JP", sans-serif;
    cursor: pointer;
    margin-top: 10px;
    letter-spacing: .05em;
    transition: transform .08s, box-shadow .2s;
    box-shadow: 0 4px 16px var(--shadow-green);
    position: relative;
    overflow: hidden;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  }
  .submit-btn:hover {
    box-shadow: 0 6px 22px rgba(45,106,79,0.35);
    transform: translateY(-1px);
  }
  .submit-btn:active { transform: scale(0.99) translateY(0); }
  .submit-btn:disabled {
    background: #aab8b0;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ===== 結果エリア ===== */
  .result-area {
    margin-top: 30px;
    padding: 28px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 14px;
    min-height: 80px;
    border-left: 4px solid var(--tree-mid);
  }
  .result-area.empty { display: none; }
  .result-status {
    color: var(--tree-mid);
    font-style: italic;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-status::before {
    content: '🌱';
    animation: sway 2s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-8deg); }
    50%       { transform: rotate(8deg); }
  }
  .result-status .dots::after {
    content: '...';
    animation: dots 1.4s steps(4) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }

  /* ===== 結果コンテンツ ===== */
  .result-content { font-size: 15px; line-height: 1.9; }
  .result-content h1, .result-content h2, .result-content h3 {
    font-family: "Noto Serif JP", serif;
    margin: 24px 0 10px;
    color: var(--tree-green);
  }
  .result-content h1 { font-size: 20px; }
  .result-content h2 {
    font-size: 17px;
    border-left: 4px solid var(--tree-mid);
    padding-left: 12px;
    background: linear-gradient(to right, var(--tree-pale), transparent);
    padding-top: 4px;
    padding-bottom: 4px;
    border-radius: 0 6px 6px 0;
  }
  .result-content h3 { font-size: 15px; color: var(--tree-green); }
  .result-content p { margin: 8px 0; }
  .result-content strong { color: var(--red-soft); }
  .result-content em { color: var(--earth); }
  .result-content ul, .result-content ol { margin: 8px 0 14px 24px; }
  .result-content li { margin: 5px 0; }
  .result-content code {
    background: var(--tree-pale);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 0.9em;
    color: var(--tree-green);
  }
  .result-content pre {
    background: var(--tree-green);
    color: var(--tree-pale);
    padding: 14px 18px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
  }
  .result-content pre code { background: none; color: inherit; padding: 0; }
  .result-content blockquote {
    border-left: 3px solid var(--tree-light);
    margin: 14px 0;
    padding: 8px 16px;
    background: var(--tree-pale);
    color: var(--ink-mid);
    border-radius: 0 8px 8px 0;
  }
  .result-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 14px 0;
    font-size: 14px;
  }
  .result-content th, .result-content td {
    border: 1px solid var(--border);
    padding: 9px 14px;
    text-align: left;
  }
  .result-content th {
    background: var(--tree-pale);
    font-weight: 600;
    color: var(--tree-green);
  }

  /* ===== エラー ===== */
  .error {
    background: #fff5f5;
    border: 1px solid #f5c6cb;
    color: var(--red-soft);
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* ===== アクションボタン ===== */
  .actions {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .actions button {
    padding: 8px 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: var(--ink-mid);
    transition: background .15s, border-color .15s;
  }
  .actions button:hover {
    background: var(--tree-pale);
    border-color: var(--tree-light);
    color: var(--tree-green);
  }

  /* ===== バッジ ===== */
  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 8px;
    background: var(--tree-pale);
    color: var(--tree-green);
    vertical-align: middle;
  }

  /* ===== 時短モード切り替え ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 22px;
    box-shadow: 0 2px 6px var(--shadow-green);
  }
  .mode-toggle button {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: #fff;
    font-size: 14px;
    font-family: "Noto Sans JP", sans-serif;
    cursor: pointer;
    color: var(--ink-mid);
    font-weight: 500;
    transition: background .2s, color .2s;
  }
  .mode-toggle button.active {
    background: linear-gradient(135deg, var(--tree-green), var(--tree-mid));
    color: #fff;
    font-weight: 700;
  }
  .mode-toggle button:not(.active):hover {
    background: var(--tree-pale);
    color: var(--tree-green);
  }

  /* ===== 再添削エリア ===== */
  .re-review-area {
    margin-top: 22px;
    padding: 20px;
    background: linear-gradient(135deg, #fffbee, #fff8dc);
    border: 1px solid #e8d49a;
    border-left: 4px solid var(--gold);
    border-radius: 12px;
  }
  .re-review-area label {
    display: block;
    font-weight: 700;
    font-size: 14px;
    color: var(--earth);
    margin-bottom: 10px;
    font-family: "Noto Serif JP", serif;
  }
  .re-review-area textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px 14px;
    border: 1px solid #d4b96a;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    background: #fff;
    transition: border-color .2s, box-shadow .2s;
  }
  .re-review-area textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,151,43,0.15);
  }
  .re-review-btn {
    margin-top: 12px;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--earth), var(--earth-light));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: "Noto Sans JP", sans-serif;
    cursor: pointer;
    letter-spacing: .04em;
    transition: box-shadow .2s, transform .1s;
    box-shadow: 0 3px 10px var(--shadow-earth);
  }
  .re-review-btn:hover {
    box-shadow: 0 5px 16px var(--shadow-earth);
    transform: translateY(-1px);
  }
  .re-review-btn:disabled {
    background: #aab8b0;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ===== カウンセラーメモ欄 ===== */
  .counselor-memo {
    margin-top: 22px;
    padding: 20px;
    background: linear-gradient(135deg, var(--tree-pale), #eaf7ee);
    border: 1px solid var(--tree-light);
    border-left: 4px solid var(--tree-green);
    border-radius: 12px;
  }
  .counselor-memo label {
    display: block;
    font-weight: 700;
    font-size: 14px;
    color: var(--tree-green);
    margin-bottom: 10px;
    font-family: "Noto Serif JP", serif;
  }
  .counselor-memo textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px 14px;
    border: 1px solid var(--tree-light);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    background: #fff;
    transition: border-color .2s, box-shadow .2s;
  }
  .counselor-memo textarea:focus {
    outline: none;
    border-color: var(--tree-mid);
    box-shadow: 0 0 0 3px rgba(64,145,108,0.15);
  }
  .memo-hint {
    font-size: 12px;
    color: var(--tree-mid);
    margin-top: 6px;
  }

  /* ===== アクションボタン拡張 ===== */
  .actions button.primary-copy {
    background: var(--tree-pale);
    border-color: var(--tree-mid);
    color: var(--tree-green);
    font-weight: 700;
  }
  .actions button.copy-rewrite {
    background: #fff8ec;
    border-color: var(--earth-light);
    color: var(--earth);
    font-weight: 700;
  }

  /* ===== レスポンシブ ===== */
  .row-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) {
    .row-2col { grid-template-columns: 1fr; }
    .container { padding: 22px 18px; }
  }

  .api-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
  }
  .help-text {
    font-size: 12px;
    color: var(--ink-light);
    margin-top: 5px;
  }

  /* ===== フッタータグライン ===== */
  .footer-tagline {
    text-align: center;
    font-size: 12px;
    color: var(--tree-mid);
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--tree-pale);
    font-style: italic;
    letter-spacing: .05em;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand-area">
      <div class="brand-icon">🌳</div>
      <div>
        <h1>就活の木 <span style="font-size:16px; font-weight:500;">ES添削ツール</span> <span class="badge">v2</span></h1>
        <div class="subtitle">ガクチカ / 自己PR / 志望動機 / 任意テーマ を Claude API で添削</div>
        <div class="brand-tagline">🌱 あなたの就活を、木を育てるように丁寧にサポート</div>
      </div>
    </div>
    <button id="settingsToggle" class="icon-btn">⚙️ API設定</button>
  </header>

  <div id="settingsPanel" class="settings-panel hidden">
    <div class="form-row">
      <label>Anthropic APIキー</label>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
        <button id="toggleKeyVisible" class="icon-btn" title="表示/非表示">👁️</button>
        <button id="saveKeyBtn" class="icon-btn">保存</button>
      </div>
      <div class="help-text">localStorage に保存(このブラウザのみ)。コンソール: console.anthropic.com</div>
    </div>
    <div class="form-row">
      <label>モデル選択</label>
      <div class="mode-toggle" style="margin-bottom:0; box-shadow:none;">
        <button id="modelSonnetBtn" class="active">🧠 Sonnet 4.6（高品質）</button>
        <button id="modelHaikuBtn">⚡ Haiku 4.5（高速・低コスト）</button>
      </div>
      <div class="help-text" id="modelHint">Sonnet：フル添削向け。Haiku：時短・コスト重視向け。</div>
    </div>
  </div>

  <div class="mode-toggle">
    <button id="modeFullBtn" class="active">📋 フル添削モード</button>
    <button id="modeQuickBtn">⚡ 時短モード（総合評価・NG表現・修正文例のみ）</button>
  </div>

  <div class="row-2col">
    <div class="form-row">
      <label>セクション</label>
      <select id="sectionType">
        <option value="gakuchika">ガクチカ (学生時代に力を入れたこと)</option>
        <option value="jikopr">自己PR</option>
        <option value="shibodoki">志望動機</option>
        <option value="custom">任意テーマ (その他のES設問)</option>
      </select>
    </div>
    <div class="form-row">
      <label>指定文字数</label>
      <select id="charCount">
        <option value="200">200文字</option>
        <option value="300">300文字</option>
        <option value="400" selected>400文字</option>
        <option value="600">600文字</option>
      </select>
    </div>
  </div>

  <div class="row-2col">
    <div class="form-row">
      <label>応募企業</label>
      <input type="text" id="company" placeholder="例: 株式会社○○商事">
    </div>
    <div class="form-row">
      <label>職種</label>
      <input type="text" id="jobType" placeholder="例: 総合職、営業、エンジニア">
    </div>
  </div>

  <div class="form-row">
    <label>求める人物像 / 採用ページ抜粋 <span class="badge">任意</span></label>
    <textarea id="idealCandidate" rows="3" placeholder="求人票や採用ページの記載を貼り付けると、人物像にマッチした添削になります"></textarea>
  </div>

  <div class="form-row" id="customQuestionRow" style="display:none;">
    <label>ESの設問内容 <span class="badge">任意テーマ時 必須</span></label>
    <textarea id="customQuestion" rows="2" placeholder="例: あなたが大切にしている価値観と、それが形成された経験を教えてください / 10年後の自分はどうなっていたいですか / 困難を乗り越えた経験を教えてください"></textarea>
    <div class="help-text">設問を正確にコピペしてください。AIがまず設問意図を分析し、最適な構造を設計してから添削します。</div>
  </div>

  <div class="form-row">
    <label>添削対象の文章</label>
    <textarea id="esText" placeholder="ここに学生のESを貼り付けてください"></textarea>
    <div class="char-counter" id="charCounter">
      現在: <span id="currentChar">0</span> 文字 / 目標: <span id="targetChar">400</span> 文字
    </div>
  </div>

  <button id="submitBtn" class="submit-btn">🖋️ 添削する</button>

  <div id="result" class="result-area empty"></div>

  <!-- 再添削エリア（添削後に表示） -->
  <div id="reReviewArea" class="re-review-area" style="display:none;">
    <label>💬 キャリ爺から追加要望（再添削）</label>

const $ = (id) => document.getElementById(id);
const STORAGE = {
  apiKey: 'es_tool_api_key',
  model: 'es_tool_model',   // 'sonnet' | 'haiku'
  company: 'es_tool_company',
  jobType: 'es_tool_job_type',
  idealCandidate: 'es_tool_ideal_candidate',
  sectionType: 'es_tool_section',
  charCount: 'es_tool_char_count',
  customQuestion: 'es_tool_custom_question'
};

const MODEL_IDS = {
  sonnet: 'claude-sonnet-4-6',
  haiku:  'claude-haiku-4-5-20251001'
};

let abortController = null;
let conversationHistory = [];
let currentMode  = 'full';    // 'full' | 'quick'
let currentModel = 'sonnet';  // 'sonnet' | 'haiku'
let lastFullText = '';

// ============================================================
// Init
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
  // Restore saved values
  const restore = (id, key) => {
    const v = localStorage.getItem(key);
    if (v !== null) $(id).value = v;
  };
  restore('apiKey', STORAGE.apiKey);
  restore('company', STORAGE.company);
  restore('jobType', STORAGE.jobType);
  restore('idealCandidate', STORAGE.idealCandidate);
  restore('sectionType', STORAGE.sectionType);
  restore('charCount', STORAGE.charCount);
  restore('customQuestion', STORAGE.customQuestion);

  // モデルの復元（sonnet / haiku）
  const savedModel = localStorage.getItem(STORAGE.model);
  if (savedModel === 'haiku') {
    currentModel = 'haiku';
    $('modelHaikuBtn').classList.add('active');
    $('modelSonnetBtn').classList.remove('active');
  }

  // Persist on change (except esText - student-specific)
  const persist = (id, key) => {
    $(id).addEventListener('change', () => localStorage.setItem(key, $(id).value));
    $(id).addEventListener('input', () => localStorage.setItem(key, $(id).value));
  };
  persist('company', STORAGE.company);
  persist('jobType', STORAGE.jobType);
  persist('idealCandidate', STORAGE.idealCandidate);
  persist('sectionType', STORAGE.sectionType);
  persist('charCount', STORAGE.charCount);
  persist('customQuestion', STORAGE.customQuestion);

  updateCharCounter();
  updateTargetChar();
  updateCustomQuestionVisibility();

  $('sectionType').addEventListener('change', updateCustomQuestionVisibility);

  $('esText').addEventListener('input', updateCharCounter);
  $('charCount').addEventListener('change', () => {
    updateTargetChar();
    updateCharCounter();
  });

  $('settingsToggle').addEventListener('click', () => {
    $('settingsPanel').classList.toggle('hidden');
  });

  $('saveKeyBtn').addEventListener('click', () => {
    const k = $('apiKey').value.trim();
    if (!k) { alert('APIキーを入力してください'); return; }
    if (!k.startsWith('sk-ant-')) {
      if (!confirm('APIキーの形式が想定と違います。このまま保存しますか?')) return;
    }
    localStorage.setItem(STORAGE.apiKey, k);
    alert('APIキーを保存しました');
  });

  $('toggleKeyVisible').addEventListener('click', () => {
    const el = $('apiKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  });

  // モデル切り替え
  $('modelSonnetBtn').addEventListener('click', () => {
    currentModel = 'sonnet';
    $('modelSonnetBtn').classList.add('active');
    $('modelHaikuBtn').classList.remove('active');
    localStorage.setItem(STORAGE.model, 'sonnet');
  });
  $('modelHaikuBtn').addEventListener('click', () => {
    currentModel = 'haiku';
    $('modelHaikuBtn').classList.add('active');
    $('modelSonnetBtn').classList.remove('active');
    localStorage.setItem(STORAGE.model, 'haiku');
  });

  $('submitBtn').addEventListener('click', onSubmit);

  // モード切り替え
  $('modeFullBtn').addEventListener('click', () => {
    currentMode = 'full';
    $('modeFullBtn').classList.add('active');
    $('modeQuickBtn').classList.remove('active');
  });
  $('modeQuickBtn').addEventListener('click', () => {
    currentMode = 'quick';
    $('modeQuickBtn').classList.add('active');
    $('modeFullBtn').classList.remove('active');
  });

  // 再添削ボタン
  $('reReviewBtn').addEventListener('click', onReReview);
});

function updateCharCounter() {
  const cur = $('esText').value.length;
  const target = parseInt($('charCount').value, 10);
  $('currentChar').textContent = cur;
  const counter = $('charCounter');
  counter.classList.remove('warn', 'over');
  if (cur > target * 1.1) counter.classList.add('over');
  else if (cur > target) counter.classList.add('warn');
}

function updateTargetChar() {
  $('targetChar').textContent = $('charCount').value;
}

function updateCustomQuestionVisibility() {
  const isCustom = $('sectionType').value === 'custom';
  $('customQuestionRow').style.display = isCustom ? '' : 'none';
}

// ============================================================
// Submit handler
// ============================================================

async function onSubmit() {
  const apiKey = ($('apiKey').value || localStorage.getItem(STORAGE.apiKey) || '').trim();
  if (!apiKey) {
    $('settingsPanel').classList.remove('hidden');
    alert('APIキーを設定してください (右上「⚙️ API設定」)');
    return;
  }

  const sectionType = $('sectionType').value;
  const charCount = $('charCount').value;
  const company = $('company').value.trim();
  const jobType = $('jobType').value.trim();
  const idealCandidate = $('idealCandidate').value.trim();
  const customQuestion = $('customQuestion').value.trim();
  const esText = $('esText').value.trim();
  const model = MODEL_IDS[currentModel];

  if (sectionType === 'custom' && !customQuestion) {
    alert('任意テーマの場合、ESの設問内容を入力してください');
    return;
  }
  if (!esText) { alert('添削対象の文章を入力してください'); return; }
  if (esText.length < 30) {
    if (!confirm('入力された文章が短いようです (30文字未満)。このまま添削しますか?')) return;
  }

  const sectionLabel = {
    gakuchika: 'ガクチカ',
    jikopr: '自己PR',
    shibodoki: '志望動機',
    custom: '任意テーマ'
  }[sectionType];

  // モードに応じて出力フォーマット指示を切り替え
  const isQuick = currentMode === 'quick';
  const outputFormatInstruction = isQuick
    ? `必ず【時短モード】の Markdown フォーマット（総合評価・NG表現3個・修正文例のみ）で出力してください。余分なセクションは省略。`
    : (sectionType === 'custom'
        ? `上記の設問について、まず「設問意図の分析」を行い、それに最適な回答構造を設計したうえで添削してください。必ず指定の Markdown フォーマット (冒頭に「🎯 設問意図の分析」を含む) で出力してください。`
        : `上記を、定義された「${sectionLabel}」の構造と原則に従って添削してください。必ず指定の Markdown フォーマットで出力してください。`);

  const userMessageLines = [
    `【セクション】${sectionLabel}`,
    `【添削モード】${isQuick ? '時短モード（要点のみ）' : 'フル添削'}`,
  ];
  if (sectionType === 'custom') {
    userMessageLines.push(`【ESの設問内容】`, customQuestion, ``);
  }
  userMessageLines.push(
    `【応募企業】${company || '(未指定)'}`,
    `【職種】${jobType || '(未指定)'}`,
    `【求める人物像】`,
    idealCandidate || '(未指定 — 総合職一般を想定)',
    ``,
    `【指定文字数】${charCount}文字以内 (±10% を許容)`,
    `【現状文字数】${esText.length}文字`,
    ``,
    `【添削対象の文章】`,
    esText,
    ``,
    outputFormatInstruction
  );
  const userMessage = userMessageLines.join('\n');

  // 会話履歴リセット（新規添削）
  conversationHistory = [{ role: 'user', content: userMessage }];

  // システムプロンプト：モードに応じて出力フォーマット部分を差し替え
  const basePrompt = SYSTEM_PROMPTS[sectionType];
  const systemPrompt = isQuick
    ? basePrompt.replace(
        /\n【出力フォーマット[\s\S]*$/,
        '\n' + QUICK_OUTPUT_FORMAT
      )
    : basePrompt;

  await runStream({ apiKey, model, systemPrompt, isNewReview: true });
}

// ============================================================
// 再添削ハンドラ
// ============================================================

async function onReReview() {
  const apiKey = ($('apiKey').value || localStorage.getItem(STORAGE.apiKey) || '').trim();
  if (!apiKey) { alert('APIキーを設定してください'); return; }

  const reRequest = $('reReviewText').value.trim();
  if (!reRequest) { alert('追加要望を入力してください'); return; }

  const model = MODEL_IDS[currentModel];
  const sectionType = $('sectionType').value;
  const isQuick = currentMode === 'quick';
  const basePrompt = SYSTEM_PROMPTS[sectionType];
  const systemPrompt = isQuick
    ? basePrompt.replace(/\n【出力フォーマット[\s\S]*$/, '\n' + QUICK_OUTPUT_FORMAT)
    : basePrompt;

  // 会話履歴に前回の返答と今回の追加要望を追加
  conversationHistory.push(
    { role: 'assistant', content: lastFullText },
    { role: 'user', content: `【追加要望】\n${reRequest}\n\n上記の要望を踏まえて、先ほどの添削結果を修正・再出力してください。フォーマットは前回と同様の Markdown 形式で。` }
  );

  await runStream({ apiKey, model, systemPrompt, isNewReview: false });
  $('reReviewText').value = '';
}

// ============================================================
// 共通ストリーム実行
// ============================================================

async function runStream({ apiKey, model, systemPrompt, isNewReview }) {
  const result = $('result');
  const submitBtn = $('submitBtn');
  const reReviewBtn = $('reReviewBtn');

  result.classList.remove('empty');
  result.innerHTML = '<div class="result-status">' + (isNewReview ? '添削中' : '再添削中') + '<span class="dots"></span></div>';
  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ 添削中...';
  reReviewBtn.disabled = true;

  // 添削中は再添削エリアを隠す
  $('reReviewArea').style.display = 'none';
  $('counselorMemoArea').style.display = 'none';

  if (abortController) abortController.abort();
  abortController = new AbortController();

  try {
    const fullText = await streamReview({
      apiKey,
      model,
      systemPrompt,
      messages: conversationHistory,
      onText: (txt) => {
        result.innerHTML = '<div class="result-content">' + renderMarkdown(txt) + '</div>';
      },
      signal: abortController.signal
    });

    lastFullText = fullText;

    // 修正文例を抽出（「✏️ 書き換え提案」または「✏️ 修正文例」セクション）
    const rewriteMatch = fullText.match(/##\s*✏️[^\n]*\n([\s\S]*?)(?=\n##|$)/);
    const rewriteText = rewriteMatch ? rewriteMatch[1].trim() : '';

    // Final render + actions
    let actionsHtml = '<div class="actions">';
    actionsHtml += '<button id="copyBtn" class="primary-copy">📋 結果をコピー</button>';
    actionsHtml += '<button id="copyMdBtn">📄 Markdown でコピー</button>';
    if (rewriteText) {
      actionsHtml += '<button id="copyRewriteBtn" class="copy-rewrite">✏️ 修正文例だけコピー</button>';
    }
    actionsHtml += '</div>';

    result.innerHTML =
      '<div class="result-content">' + renderMarkdown(fullText) + '</div>' +
      actionsHtml;

    $('copyBtn').addEventListener('click', () => {
      const memo = $('counselorMemo') ? $('counselorMemo').value.trim() : '';
      const text = result.querySelector('.result-content').innerText + (memo ? '\n\n【カウンセラーメモ】\n' + memo : '');
      navigator.clipboard.writeText(text).then(() => alert('コピーしました'));
    });
    $('copyMdBtn').addEventListener('click', () => {
      const memo = $('counselorMemo') ? $('counselorMemo').value.trim() : '';
      const text = fullText + (memo ? '\n\n## 📌 カウンセラーメモ\n' + memo : '');
      navigator.clipboard.writeText(text).then(() => alert('Markdownでコピーしました'));
    });
    if (rewriteText) {
      $('copyRewriteBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(rewriteText).then(() => alert('修正文例をコピーしました'));
      });
    }

    // 添削完了後にサブパネルを表示
    $('reReviewArea').style.display = '';
    $('counselorMemoArea').style.display = '';

  } catch (e) {
    console.error(e);
    result.innerHTML = '<div class="error">エラー: ' + escapeHtml(e.message || String(e)) + '</div>';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🖋️ 添削する';
    reReviewBtn.disabled = false;
    abortController = null;
  }
}

// ============================================================
// Streaming Anthropic API call
// ============================================================

async function streamReview({ apiKey, model, systemPrompt, messages, onText, signal }) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    signal,
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model,
      max_tokens: 4096,
      stream: true,
      system: [
        {
          type: 'text',
          text: systemPrompt,
          cache_control: { type: 'ephemeral' }
        }
      ],
      messages
    })
  });

  if (!response.ok) {
    let detail = '';
    try {
      const errJson = await response.json();
      detail = errJson?.error?.message || JSON.stringify(errJson);
    } catch (_) {
      detail = await response.text();
    }
    if (response.status === 401) {
      throw new Error('APIキーが無効です。⚙️ API設定 から再確認してください。\n' + detail);
    }
    if (response.status === 429) {
      throw new Error('レート制限に達しました。しばらく待ってから再試行してください。\n' + detail);
    }
    throw new Error(`API エラー (${response.status}): ${detail}`);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (!data) continue;
      try {
        const evt = JSON.parse(data);
        if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
          fullText += evt.delta.text;
          onText(fullText);
        } else if (evt.type === 'message_stop') {
          // done
        } else if (evt.type === 'error') {
          throw new Error(evt.error?.message || 'Streaming error');
        }
      } catch (e) {
        // Ignore parse errors on non-JSON lines (e.g. ping events have already been filtered)
      }
    }
  }

  return fullText;
}

// ============================================================
// Minimal Markdown renderer (handles streaming partial input)
// ============================================================

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function inlineMd(text) {
  // bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // italic (avoid clashing with bold; require word boundaries)
  text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  return text;
}

function renderMarkdown(src) {
  if (!src) return '';
  const lines = src.split('\n');
  let html = '';
  let i = 0;
  let inCode = false;
  let listType = null; // 'ul' | 'ol'

  const closeList = () => {
    if (listType) {
      html += `</${listType}>`;
      listType = null;
    }
  };

  while (i < lines.length) {
    const line = lines[i];

    // Code block fence
    if (/^```/.test(line)) {
      closeList();
      if (!inCode) {
        html += '<pre><code>';
        inCode = true;
      } else {
        html += '</code></pre>';
        inCode = false;
      }
      i++;
      continue;
    }
    if (inCode) {
      html += escapeHtml(line) + '\n';
      i++;
      continue;
    }

    // Tables: header row followed by separator
    if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:\-|]+\|?\s*$/.test(lines[i + 1]) && lines[i + 1].includes('-')) {
      closeList();
      const parseRow = (l) => {
        let cells = l.split('|');
        if (cells[0].trim() === '') cells.shift();
        if (cells.length && cells[cells.length - 1].trim() === '') cells.pop();
        return cells.map(c => c.trim());
      };
      const headers = parseRow(line);
      html += '<table><thead><tr>';
      headers.forEach(h => html += `<th>${inlineMd(escapeHtml(h))}</th>`);
      html += '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].includes('|')) {
        const cells = parseRow(lines[i]);
        html += '<tr>';
        cells.forEach(c => html += `<td>${inlineMd(escapeHtml(c))}</td>`);
        html += '</tr>';
        i++;
      }
      html += '</tbody></table>';
      continue;
    }

    // Headings
    let m;
    if ((m = line.match(/^###\s+(.+)$/))) {
      closeList();
      html += `<h3>${inlineMd(escapeHtml(m[1]))}</h3>`;
      i++;
      continue;
    }
    if ((m = line.match(/^##\s+(.+)$/))) {
      closeList();
      html += `<h2>${inlineMd(escapeHtml(m[1]))}</h2>`;
      i++;
      continue;
    }
    if ((m = line.match(/^#\s+(.+)$/))) {
      closeList();
      html += `<h1>${inlineMd(escapeHtml(m[1]))}</h1>`;
      i++;
      continue;
    }

    // Lists
    if ((m = line.match(/^\s*[-*]\s+(.+)$/))) {
      if (listType !== 'ul') { closeList(); html += '<ul>'; listType = 'ul'; }
      html += `<li>${inlineMd(escapeHtml(m[1]))}</li>`;
      i++;
      continue;
    }
    if ((m = line.match(/^\s*\d+\.\s+(.+)$/))) {
      if (listType !== 'ol') { closeList(); html += '<ol>'; listType = 'ol'; }
      html += `<li>${inlineMd(escapeHtml(m[1]))}</li>`;
      i++;
      continue;
    }

    // Blockquote
    if ((m = line.match(/^>\s+(.+)$/))) {
      closeList();
      html += `<blockquote>${inlineMd(escapeHtml(m[1]))}</blockquote>`;
      i++;
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      closeList();
      i++;
      continue;
    }

    // Paragraph (collect consecutive non-special lines)
    closeList();
    let para = line;
    let j = i + 1;
    while (j < lines.length && lines[j].trim() !== '' &&
           !/^(#{1,3}\s|```|>\s|\s*[-*]\s|\s*\d+\.\s)/.test(lines[j]) &&
           !lines[j].includes('|')) {
      para += '\n' + lines[j];
      j++;
    }
    html += `<p>${inlineMd(escapeHtml(para)).replace(/\n/g, '<br>')}</p>`;
    i = j;
  }

  closeList();
  if (inCode) html += '</code></pre>';
  return html;
}
